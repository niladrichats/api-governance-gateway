version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trustrail
      POSTGRES_PASSWORD: trustrail123
      POSTGRES_DB: trustrail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trustrail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustrail"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
    networks:
      - trustrail

  accounts:
    build:
      context: .
      dockerfile: services/accounts/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
    networks:
      - trustrail

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      accounts:
        condition: service_started
    environment:
      - ACCOUNTS_SERVICE_URL=http://accounts:8001
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
    networks:
      - trustrail

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - payments
      - accounts
      - auth
    environment:
      - PAYMENTS_SERVICE_URL=http://payments:8000
      - ACCOUNTS_SERVICE_URL=http://accounts:8001
      - AUTH_SERVICE_URL=http://auth:8002
    networks:
      - trustrail

networks:
  trustrail:
    driver: bridge

volumes:
  accounts_data:
  payments_data:
  postgres_data:
