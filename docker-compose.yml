version: '3.8'

services:
  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"
    networks:
      - trustrail

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - trustrail

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - trustrail
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trustrail
      POSTGRES_PASSWORD: trustrail123
      POSTGRES_DB: trustrail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trustrail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustrail"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - trustrail

  accounts:
    build:
      context: .
      dockerfile: services/accounts/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - trustrail

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      accounts:
        condition: service_started
    environment:
      - ACCOUNTS_SERVICE_URL=http://accounts:8001
      - DATABASE_URL=postgresql://trustrail:trustrail123@postgres/trustrail
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - trustrail
  
  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    ports:
      - "8004:8004"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - trustrail

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - payments
      - accounts
      - auth
    environment:
      - PAYMENTS_SERVICE_URL=http://payments:8000
      - ACCOUNTS_SERVICE_URL=http://accounts:8001
      - AUTH_SERVICE_URL=http://auth:8002
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - trustrail
  
  fraud_detection:
    build:
      context: .
      dockerfile: services/fraud_detection/Dockerfile
    ports:
      - "8003:8003"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - trustrail

networks:
  trustrail:
    driver: bridge

volumes:
  accounts_data:
  payments_data:
  postgres_data:
